<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMC Chart Analyzer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #08090d;
    --card: #0f1117;
    --border: #1c2030;
    --border2: #252d42;
    --text: #dde1ec;
    --muted: #5a6280;
    --buy: #00e5a0;
    --sell: #ff4d6a;
    --gold: #f5c542;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 80px;
  }

  h1 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 40px;
    font-weight: 300;
  }

  .drop-zone {
    width: 100%;
    max-width: 560px;
    border: 1.5px dashed var(--border2);
    border-radius: 16px;
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    background: var(--card);
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--buy);
    background: rgba(0,229,160,0.03);
  }
  .drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-icon { font-size: 32px; margin-bottom: 14px; opacity: 0.5; }
  .drop-text { font-size: 15px; color: var(--text); font-weight: 400; margin-bottom: 6px; }
  .drop-sub { font-size: 12px; color: var(--muted); font-family: var(--mono); }

  #preview { width: 100%; max-width: 560px; margin-top: 20px; display: none; }
  #preview img { width: 100%; border-radius: 10px; border: 1px solid var(--border); display: block; }
  .img-label { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.1em; text-transform: uppercase; }

  #analyseBtn {
    display: none;
    margin-top: 20px;
    width: 100%;
    max-width: 560px;
    padding: 16px;
    background: var(--buy);
    color: #000;
    border: none;
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  #analyseBtn:hover { opacity: 0.85; }
  #analyseBtn:active { transform: scale(0.98); }
  #analyseBtn:disabled { opacity: 0.35; cursor: default; }

  #loading { display: none; margin-top: 32px; text-align: center; }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
  .loading-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--buy); margin: 0 3px;
    animation: pulse 1.2s ease-in-out infinite;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  .loading-text { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 10px; letter-spacing: 0.08em; }

  #result { display: none; width: 100%; max-width: 560px; margin-top: 24px; }

  .verdict-card {
    border-radius: 12px; padding: 24px 26px; margin-bottom: 14px; border: 1px solid transparent;
  }
  .verdict-card.buy  { background: rgba(0,229,160,0.06); border-color: rgba(0,229,160,0.2); }
  .verdict-card.sell { background: rgba(255,77,106,0.06); border-color: rgba(255,77,106,0.2); }
  .verdict-card.wait { background: rgba(90,98,128,0.08); border-color: var(--border2); }
  .verdict-card.caution { background: rgba(245,197,66,0.05); border-color: rgba(245,197,66,0.2); }

  .verdict-dir { font-family: var(--mono); font-size: 28px; font-weight: 600; margin-bottom: 8px; }
  .verdict-dir.buy  { color: var(--buy); }
  .verdict-dir.sell { color: var(--sell); }
  .verdict-dir.wait { color: var(--muted); }
  .verdict-dir.caution { color: var(--gold); }
  .verdict-reason { font-size: 14px; color: var(--text); line-height: 1.7; font-weight: 300; }

  .detail-block {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px 20px; margin-bottom: 12px;
  }
  .detail-title {
    font-family: var(--mono); font-size: 10px; font-weight: 600; color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px;
  }
  .detail-text { font-size: 13px; color: var(--text); line-height: 1.8; font-weight: 300; }
  .detail-text strong { font-weight: 500; color: var(--text); }

  .check-list { list-style: none; }
  .check-list li {
    display: flex; gap: 10px; align-items: flex-start; padding: 7px 0;
    border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text);
    line-height: 1.5; font-weight: 300;
  }
  .check-list li:last-child { border-bottom: none; padding-bottom: 0; }
  .ci { flex-shrink: 0; font-size: 13px; margin-top: 1px; }
  .ci.y { color: var(--buy); }
  .ci.n { color: var(--sell); }
  .ci.q { color: var(--gold); }

  #resetBtn {
    display: none; margin-top: 10px; width: 100%; max-width: 560px; padding: 12px;
    background: transparent; color: var(--muted); border: 1px solid var(--border2);
    border-radius: 10px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
    cursor: pointer; transition: color 0.15s, border-color 0.15s;
  }
  #resetBtn:hover { color: var(--text); border-color: var(--text); }

  .error-msg {
    background: rgba(255,77,106,0.07); border: 1px solid rgba(255,77,106,0.2);
    border-radius: 8px; padding: 14px 16px; font-size: 13px; color: var(--sell);
    font-family: var(--mono); margin-top: 16px; max-width: 560px; width: 100%;
  }
</style>
</head>
<body>

<h1>SMC Chart Analyzer</h1>
<p class="subtitle">Upload a screenshot — get an instant trade read</p>

<div class="drop-zone" id="dropZone">
  <input type="file" accept="image/*" id="fileInput">
  <div class="drop-icon">📈</div>
  <div class="drop-text">Drop your chart screenshot here</div>
  <div class="drop-sub">or click to browse &nbsp;·&nbsp; PNG, JPG, WebP</div>
</div>

<div id="preview">
  <div class="img-label">Your chart</div>
  <img id="previewImg" src="" alt="Chart preview">
</div>

<button id="analyseBtn" onclick="runAnalysis()">ANALYSE CHART</button>

<div id="loading">
  <div><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>
  <div class="loading-text">Reading chart structure…</div>
</div>

<div id="result"></div>
<div id="errorBox"></div>
<button id="resetBtn" onclick="reset()">↩ Analyse another chart</button>

<script>
let imageBase64 = null;
let imageMime = 'image/png';

const dropZone   = document.getElementById('dropZone');
const fileInput  = document.getElementById('fileInput');
const preview    = document.getElementById('preview');
const previewImg = document.getElementById('previewImg');
const analyseBtn = document.getElementById('analyseBtn');
const loading    = document.getElementById('loading');
const resultDiv  = document.getElementById('result');
const errorBox   = document.getElementById('errorBox');
const resetBtn   = document.getElementById('resetBtn');

fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  imageMime = file.type;
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    imageBase64 = dataUrl.split(',')[1];
    previewImg.src = dataUrl;
    preview.style.display = 'block';
    analyseBtn.style.display = 'block';
    resultDiv.style.display = 'none';
    resultDiv.innerHTML = '';
    resetBtn.style.display = 'none';
    errorBox.innerHTML = '';
  };
  reader.readAsDataURL(file);
}

async function runAnalysis() {
  if (!imageBase64) return;
  analyseBtn.disabled = true;
  loading.style.display = 'block';
  resultDiv.style.display = 'none';
  errorBox.innerHTML = '';
  resetBtn.style.display = 'none';

  const prompt = `You are an expert Smart Money Concepts (SMC) and ICT trader. Analyse this trading chart screenshot carefully.

Identify only what you can actually see. Look for:
- BOS / CHoCH (Break of Structure / Change of Character)
- Liquidity sweeps (sweep of highs or lows)
- Fair Value Gaps (FVG) or imbalance zones
- Supply and demand / order blocks
- Overall HTF trend bias
- Entry zone, stop loss placement, take profit target
- Any reasons NOT to trade

Respond ONLY in this exact JSON format with no markdown, no backticks, pure JSON:
{
  "verdict": "BUY or SELL or WAIT or CAUTION",
  "summary": "One plain English sentence verdict",
  "structure": "What structure you see",
  "fvg": "FVG or imbalance zones visible, or none",
  "bias": "Overall trend bias",
  "entry": "Ideal entry zone description",
  "sl": "Stop loss placement logic",
  "tp": "Take profit target logic",
  "risk": "Reasons to be cautious or skip",
  "checks": [
    {"label": "Sweep of liquidity", "pass": true or false or null, "note": "brief note"},
    {"label": "Break of Structure", "pass": true or false or null, "note": "brief note"},
    {"label": "FVG present", "pass": true or false or null, "note": "brief note"},
    {"label": "HTF bias aligned", "pass": true or false or null, "note": "brief note"},
    {"label": "Clean entry zone", "pass": true or false or null, "note": "brief note"},
    {"label": "Risk manageable", "pass": true or false or null, "note": "brief note"}
  ]
}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: imageMime, data: imageBase64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message || 'API error');

    const raw = (data.content.find(b => b.type === 'text') || {}).text || '';
    let json;
    try {
      json = JSON.parse(raw.replace(/```json|```/g, '').trim());
    } catch {
      throw new Error('Could not parse response. Raw output: ' + raw.slice(0, 300));
    }
    renderResult(json);

  } catch (err) {
    errorBox.innerHTML = '<div class="error-msg">Error: ' + err.message + '</div>';
  } finally {
    analyseBtn.disabled = false;
    loading.style.display = 'none';
    resetBtn.style.display = 'block';
  }
}

function renderResult(j) {
  const v = (j.verdict || 'WAIT').toUpperCase();
  const cls = v === 'BUY' ? 'buy' : v === 'SELL' ? 'sell' : v === 'CAUTION' ? 'caution' : 'wait';

  function icon(pass) {
    if (pass === true)  return '<span class="ci y">&#10004;</span>';
    if (pass === false) return '<span class="ci n">&#10008;</span>';
    return '<span class="ci q">?</span>';
  }

  const checksHtml = (j.checks || []).map(c =>
    '<li>' + icon(c.pass) + '<span><strong>' + c.label + '</strong>' + (c.note ? ' — ' + c.note : '') + '</span></li>'
  ).join('');

  const fvgHtml = j.fvg && j.fvg.toLowerCase() !== 'none' && j.fvg.trim()
    ? '<div class="detail-block"><div class="detail-title">FVG / Imbalance</div><div class="detail-text">' + j.fvg + '</div></div>'
    : '';

  const riskHtml = j.risk && j.risk.trim()
    ? '<div class="detail-block"><div class="detail-title">Risk / Caution</div><div class="detail-text">' + j.risk + '</div></div>'
    : '';

  resultDiv.innerHTML =
    '<div class="verdict-card ' + cls + '">' +
      '<div class="verdict-dir ' + cls + '">' + v + '</div>' +
      '<div class="verdict-reason">' + (j.summary || '') + '</div>' +
    '</div>' +

    '<div class="detail-block">' +
      '<div class="detail-title">SMC Checklist</div>' +
      '<ul class="check-list">' + checksHtml + '</ul>' +
    '</div>' +

    '<div class="detail-block">' +
      '<div class="detail-title">Structure</div>' +
      '<div class="detail-text">' + (j.structure || '—') + '</div>' +
    '</div>' +

    '<div class="detail-block">' +
      '<div class="detail-title">HTF Bias</div>' +
      '<div class="detail-text">' + (j.bias || '—') + '</div>' +
    '</div>' +

    fvgHtml +

    '<div class="detail-block">' +
      '<div class="detail-title">Trade Levels</div>' +
      '<div class="detail-text">' +
        '<strong>Entry:</strong> ' + (j.entry || '—') + '<br>' +
        '<strong>Stop Loss:</strong> ' + (j.sl || '—') + '<br>' +
        '<strong>Take Profit:</strong> ' + (j.tp || '—') +
      '</div>' +
    '</div>' +

    riskHtml;

  resultDiv.style.display = 'block';
  resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function reset() {
  imageBase64 = null;
  fileInput.value = '';
  preview.style.display = 'none';
  analyseBtn.style.display = 'none';
  resultDiv.style.display = 'none';
  resultDiv.innerHTML = '';
  resetBtn.style.display = 'none';
  errorBox.innerHTML = '';
  loading.style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
